name: PDF Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: |
          pip install pyTelegramBotAPI
          pip install reportlab
      
      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python bot.py
